query CartTransformRunInput {
  cart {
    lines {
      id
      quantity

      attributes {
        key
        value
      }

      merchandise {
        __typename
        ... on ProductVariant {
          id
        }
      }
    }
  }

  shop {
    metafield(
      namespace: "gbi_curtain_pricing",
      key: "component_variant_id"
    ) {
      value
    }
  }
}